name: Fetch Pioupiou Data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historique complet pour rebase

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch & aggregate data
        run: node fetch-data.js
        env:
          MF_API_KEY: ${{ secrets.MF_API_KEY }}

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "Rien à committer" && exit 0
          git commit -m "chore: update wind data $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin master
          git push
