<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WindStats — Analyse Brise & Météo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #090c12;
      --bg2:       #0f1420;
      --bg3:       #161c2d;
      --border:    rgba(255,255,255,0.07);
      --text:      #c8d0e0;
      --text-dim:  rgba(200,208,224,0.45);
      --accent:    #38bdf8;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "DM Mono", monospace;
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    /* ── Fond étoilé ──────────────────────────────────────────── */
    body::before {
      content: "";
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(56,189,248,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(251,146,60,0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    /* ── Header ───────────────────────────────────────────────── */
    header {
      position: relative; z-index: 1;
      padding: 2.5rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    .logo {
      font-family: "Syne", sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .logo span {
      color: var(--accent);
    }

    .tagline {
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Layout ───────────────────────────────────────────────── */
    main {
      position: relative; z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    /* ── Station ──────────────────────────────────────────────── */
    .station {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .station-title {
      font-family: "Syne", sans-serif;
      font-weight: 600;
      font-size: 1.1rem;
      padding: 1.1rem 1.5rem;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .station-id {
      font-size: 0.7rem;
      font-family: "DM Mono", monospace;
      color: var(--text-dim);
      background: rgba(255,255,255,0.05);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }

    .station-body {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .updated {
      font-size: 0.72rem;
      color: var(--text-dim);
    }

    .loading {
      color: var(--text-dim);
      font-size: 0.85rem;
      padding: 2rem;
      text-align: center;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

    .error-msg {
      color: #f87171;
      font-size: 0.8rem;
      padding: 0.5rem 1.5rem;
    }

    /* ── Phenomena cards ──────────────────────────────────────── */
    .phenomena-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
    }

    .ph-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-top: 3px solid var(--ph-color);
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.15s;
    }

    .ph-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.8rem 1rem;
      cursor: pointer;
      user-select: none;
      flex-wrap: wrap;
    }

    .ph-header:hover { background: rgba(255,255,255,0.03); }

    .ph-chevron {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--text-dim);
      transition: transform 0.2s;
    }

    .ph-card.open .ph-chevron { transform: rotate(90deg); }

    .ph-body {
      display: none;
      padding: 0 1rem 1rem;
      flex-direction: column;
      gap: 0.5rem;
    }

    .ph-card.open .ph-body { display: flex; }

    .ph-icon {
      font-size: 1.2rem;
      color: var(--ph-color);
      line-height: 1;
      flex-shrink: 0;
    }

    .ph-name {
      font-family: "Syne", sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      color: #fff;
      flex-shrink: 0;
    }

    .ph-fresh-inline {
      font-size: 0.62rem;
      font-family: var(--mono);
      color: var(--text-dim);
      background: rgba(255,255,255,0.04);
      border-radius: 3px;
      padding: 2px 5px;
      white-space: nowrap;
    }

    .ph-nodata {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-top: 0.5rem;
    }

    .ph-stats {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      padding: 0.25rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .stat-label { color: var(--text-dim); }
    .stat-val   { color: #fff; font-weight: 500; }

    /* ── Charts ───────────────────────────────────────────────── */
    .charts-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1rem;
    }

    .chart-block {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .chart-block h3 {
      font-family: "Syne", sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .chart-block canvas {
      width: 100%;
      height: auto;
    }

    /* ── Section titles ───────────────────────────────────────── */
    .section-title {
      font-family: "Syne", sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.8rem;
    }

    /* ── Calendar ─────────────────────────────────────────────── */
    .calendar-section { }

    .cal-legend {
      font-size: 0.75rem;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-wrap: wrap;
      margin-bottom: 0.8rem;
    }

    .cal-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
      gap: 4px;
    }

    .cal-day {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      min-height: 48px;
      transition: background 0.1s;
    }

    .cal-day.has-event {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.12);
    }

    .cal-date {
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .cal-pills {
      display: flex;
      flex-direction: column;
      gap: 2px;
      width: 100%;
    }

    .pill {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: color-mix(in srgb, var(--pill-color) 20%, transparent);
      border: 1px solid color-mix(in srgb, var(--pill-color) 50%, transparent);
      border-radius: 3px;
      padding: 2px 4px;
      cursor: default;
      overflow: hidden;
      min-width: 0;
    }

    .pill-time {
      font-size: 0.62rem;
      font-family: var(--mono);
      color: var(--pill-color);
      letter-spacing: -0.03em;
      white-space: nowrap;
    }

    .pill-row2 {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .pill-vmax {
      font-size: 0.58rem;
      font-family: var(--mono);
      color: var(--text-dim);
      white-space: nowrap;
    }

    .pill-gust {
      font-size: 0.58rem;
      font-family: var(--mono);
      color: #ff6b6b;
      white-space: nowrap;
    }

    /* ── En cours ─────────────────────────────────────────────── */
    .live-banner {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: rgba(56,189,248,0.07);
      border: 1px solid rgba(56,189,248,0.2);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.2rem;
      font-size: 0.82rem;
    }

    .live-banner.active {
      background: rgba(74,222,128,0.07);
      border-color: rgba(74,222,128,0.25);
    }

    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
    }

    .live-banner.active .live-dot {
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80aa;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .live-text { color: var(--text); }
    .live-text strong { color: #4ade80; }
    .live-banner:not(.active) .live-text { color: var(--text-dim); }

    /* ── Episode table ────────────────────────────────────────── */
    .episode-section { }

    .ep-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
    }

    .ep-table th {
      text-align: left;
      padding: 0.4rem 0.6rem;
      color: var(--text-dim);
      font-weight: 400;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .ep-table td {
      padding: 0.35rem 0.6rem;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .ep-table tr:hover td { background: rgba(255,255,255,0.025); }

    .ep-table .gust { color: #fbbf24; }

    .station-header {
      cursor: pointer;
      user-select: none;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .station-header:hover { background: rgba(255,255,255,0.03); }

    .station-header-left {
      flex: 1;
      min-width: 0;
    }

    .station-header-top {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
    }

    .station-chevron {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-left: auto;
    }

    .station-live { margin-bottom: 0.3rem; }

    /* Dernier relevé */
    .last-measure {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      font-family: var(--mono);
      color: var(--text);
      flex-wrap: wrap;
      margin-bottom: 0.4rem;
    }

    .lm-time  { color: var(--accent); font-weight: 500; }
    .lm-sep   { color: var(--text-dim); }
    .lm-speed { color: var(--text); }
    .lm-gust  { }
    .lm-dir   { color: var(--text-dim); }
    .lm-age   { color: var(--text-dim); font-size: 0.7rem; }

    /* Chips phénomènes condensés */
    .ph-summary {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-top: 0.2rem;
    }

    .ph-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.72rem;
      font-family: var(--mono);
      background: color-mix(in srgb, var(--ph-color) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--ph-color) 30%, transparent);
      border-radius: 20px;
      padding: 2px 8px;
      color: var(--text-dim);
    }

    .ph-chip strong { color: var(--ph-color); }

    .station-body.collapsed { display: none; }

    .station-spark {
      flex-shrink: 0;
      width: 140px;
      overflow: hidden;
      border-radius: 4px;
      opacity: 0.9;
    }

    .station-spark svg.sparkline {
      display: block;
      width: 140px;
      height: 52px;
    }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { flex-direction: column; gap: 0.3rem; padding: 1.5rem 1rem; }
      main   { padding: 1rem; }
      .calendar-grid { grid-template-columns: repeat(auto-fill, minmax(68px, 1fr)); }
      .pill-time { font-size: 0.52rem; }
      .pill-vmax, .pill-gust { font-size: 0.52rem; }
      .ep-table { font-size: 0.7rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Wind<span>Stats</span></div>
  <div class="tagline">Analyse brise &amp; rentrées météo</div>
</header>

<main id="app">
  <!-- Les stations sont injectées dynamiquement par app.js -->
</main>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
